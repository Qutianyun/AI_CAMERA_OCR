<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/><title>AI CAMERA V8 OCR ROI FAST</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.stage{position:fixed;inset:0;background:#000;overflow:hidden}video,canvas{position:absolute;inset:0;width:100vw;height:100vh;object-fit:cover;background:#000}.hidden{display:none!important}.overlay{position:absolute;inset:0;z-index:10;pointer-events:none}.box{position:absolute;border-radius:4px;pointer-events:none}.ocr{border:3px solid #22c55e;background:rgba(34,197,94,.06)}.weak{border:3px solid #f59e0b;background:rgba(245,158,11,.06)}.bad{border:3px solid #ef4444;background:rgba(239,68,68,.06)}.roi{border:4px dashed rgba(59,130,246,.86);background:rgba(59,130,246,.025)}.controls{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));z-index:30;display:flex;justify-content:center;gap:10px;padding:0 10px}.btn{border:0;border-radius:16px;color:#fff;font-weight:900;font-size:16px;padding:14px 16px;min-width:106px;box-shadow:0 8px 22px rgba(0,0,0,.32)}#doneBtn{background:#dc2626}#startBtn{background:#16a34a}#shotBtn{background:#2563eb}.btn:disabled{opacity:.45}.flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:40;pointer-events:none;transition:opacity .18s}.flash.on{opacity:.52}@media(max-width:390px){.btn{font-size:15px;min-width:96px;padding:13px 12px}.controls{gap:8px}}
</style></head><body><div class="stage"><video id="video" playsinline muted autoplay></video><canvas id="canvas" class="hidden"></canvas><div id="overlay" class="overlay"></div></div><div class="controls"><button class="btn" id="doneBtn" disabled>完成释放</button><button class="btn" id="startBtn">打开摄像头</button><button class="btn" id="shotBtn" disabled>拍照识别</button></div><div class="flash" id="flash"></div>
<script type="module">
const video=document.getElementById('video'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),overlay=document.getElementById('overlay');let stream=null,lastBoxes=[],ocrWorker=null,loadingOCR=null,stdText='';
function normText(s){return(s||'').toString().toLowerCase().replace(/[\s\n\r\t　]/g,'').replace(/[·•･・]/g,'').replace(/[：:]/g,'').replace(/[、，,。\.]/g,'').replace(/[()（）]/g,'').replace(/[\-‐‑–—]/g,'').replace(/[ａ-ｚＡ-Ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0))}
function bigrams(s){s=normText(s);const a=new Set();for(let i=0;i<s.length-1;i++)a.add(s.slice(i,i+2));return a}let jpBi=new Set();function simToJP(t){const b=bigrams(t);if(!b.size||!jpBi.size)return 0;let hit=0;for(const x of b)if(jpBi.has(x))hit++;return hit/Math.max(1,b.size)}
async function loadStd(){try{const r=await fetch('standard_texts.json',{cache:'no-store'});const j=await r.json();stdText=j.languages?.JP?.text||'';jpBi=bigrams(stdText)}catch(e){stdText='';jpBi=new Set()}}
function coverMap(){const vw=innerWidth,vh=innerHeight,iw=canvas.width||video.videoWidth||1,ih=canvas.height||video.videoHeight||1,s=Math.max(vw/iw,vh/ih),ox=(vw-iw*s)/2,oy=(vh-ih*s)/2;return{s,ox,oy}}
function drawBox(cls,x,y,w,h){const m=coverMap(),d=document.createElement('div');d.className='box '+cls;d.style.left=(x*m.s+m.ox)+'px';d.style.top=(y*m.s+m.oy)+'px';d.style.width=Math.max(4,w*m.s)+'px';d.style.height=Math.max(6,h*m.s)+'px';overlay.appendChild(d)}
function drawOverlay(){overlay.innerHTML='';for(const b of lastBoxes)drawBox(b.cls,b.x,b.y,b.w,b.h)}
async function loadOCR(){if(ocrWorker)return ocrWorker;if(loadingOCR)return loadingOCR;loadingOCR=(async()=>{await new Promise((resolve,reject)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';s.onload=resolve;s.onerror=reject;document.head.appendChild(s)});ocrWorker=await Tesseract.createWorker('jpn');try{await ocrWorker.setParameters({tessedit_pageseg_mode:'6',preserve_interword_spaces:'1'})}catch(e){}return ocrWorker})().catch(e=>null);return loadingOCR}
async function startCamera(){try{if(stream)stopCamera(false);stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();canvas.classList.add('hidden');video.classList.remove('hidden');overlay.innerHTML='';lastBoxes=[];document.getElementById('shotBtn').disabled=false;document.getElementById('doneBtn').disabled=false;document.getElementById('startBtn').disabled=true;loadOCR()}catch(e){}}
function stopCamera(clear=true){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null;document.getElementById('shotBtn').disabled=true;document.getElementById('doneBtn').disabled=true;document.getElementById('startBtn').disabled=false;if(clear){overlay.innerHTML='';lastBoxes=[];canvas.classList.add('hidden');video.classList.remove('hidden')}}
async function completeAndReopen(){stopCamera(true);await new Promise(r=>setTimeout(r,180));await startCamera()}
function flash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),90)}
function captureFrame(){const w=video.videoWidth,h=video.videoHeight;if(!w||!h)return false;canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);video.classList.add('hidden');canvas.classList.remove('hidden');flash();return true}
function getGrayData(c){const d=c.getContext('2d').getImageData(0,0,c.width,c.height).data,g=new Uint8Array(c.width*c.height);for(let i=0,p=0;i<d.length;i+=4,p++)g[p]=.299*d[i]+.587*d[i+1]+.114*d[i+2];return g}
function detectProductAndTextROI(){const w=canvas.width,h=canvas.height,g=getGrayData(canvas);let rows=[];for(let y=0;y<h;y++){let dark=0,light=0;for(let x=0;x<w;x++){const v=g[y*w+x];if(v<130)dark++;if(v>180)light++}rows[y]={dark:dark/w,light:light/w}}let ys=[];for(let y=0;y<h;y++)if(rows[y].dark>.18)ys.push(y);let py1=ys.length?Math.max(0,ys[0]-10):Math.round(h*.05),py2=ys.length?Math.min(h-1,ys[ys.length-1]+10):Math.round(h*.88);let cols=[];for(let x=0;x<w;x++){let dark=0;for(let y=py1;y<=py2;y++)if(g[y*w+x]<130)dark++;cols[x]=dark/(py2-py1+1)}let xs=[];for(let x=0;x<w;x++)if(cols[x]>.18)xs.push(x);let px1=xs.length?Math.max(0,xs[0]-10):Math.round(w*.05),px2=xs.length?Math.min(w-1,xs[xs.length-1]+10):Math.round(w*.95);let labelTop=null;for(let y=py1+Math.round((py2-py1)*.38);y<py2;y++){let light=0,dark=0;for(let x=px1;x<=px2;x++){let v=g[y*w+x];if(v>180)light++;if(v<120)dark++}let ww=px2-px1+1;if(light/ww>.18&&dark/ww<.55){labelTop=y;break}}
let top=py1+Math.round((py2-py1)*.08),bottom=py1+Math.round((py2-py1)*.56);if(labelTop)bottom=Math.min(bottom,labelTop-Math.round((py2-py1)*.035));let roi={x:px1+Math.round((px2-px1)*.02),y:Math.max(0,top),w:Math.round((px2-px1)*.96),h:Math.max(50,bottom-top)};return roi}
function makeCrop(roi){const maxW=900,scale=Math.min(1,maxW/roi.w),cw=Math.round(roi.w*scale),ch=Math.round(roi.h*scale);const c=document.createElement('canvas');c.width=cw;c.height=ch;const x=c.getContext('2d');x.drawImage(canvas,roi.x,roi.y,roi.w,roi.h,0,0,cw,ch);const img=x.getImageData(0,0,cw,ch),d=img.data;for(let i=0;i<d.length;i+=4){let v=.299*d[i]+.587*d[i+1]+.114*d[i+2];v=(v-128)*1.7+128;v=v>145?255:0;d[i]=d[i+1]=d[i+2]=Math.max(0,Math.min(255,v))}x.putImageData(img,0,0);return{canvas:c,scale}}
function extractLines(ret,roi,scale){const out=[],lines=ret?.data?.lines||[];for(const ln of lines){const b=ln.bbox||{};let x=(b.x0||0)/scale+roi.x,y=(b.y0||0)/scale+roi.y,w=((b.x1||0)-(b.x0||0))/scale,h=((b.y1||0)-(b.y0||0))/scale;let text=ln.text||'',s=simToJP(text),conf=(ln.confidence||0)/100;let cls=s>.28||conf>.55?'ocr':s>.10||conf>.25?'weak':'bad';if(w>10&&h>4)out.push({cls,x,y,w,h,text})}return out}
async function recognize(){const worker=await loadOCR();lastBoxes=[];if(!worker){lastBoxes=[{cls:'bad',x:canvas.width*.05,y:canvas.height*.35,w:canvas.width*.9,h:canvas.height*.12}];drawOverlay();return}const roi=detectProductAndTextROI();lastBoxes.push({cls:'engine',x:roi.x,y:roi.y,w:roi.w,h:roi.h});const crop=makeCrop(roi);try{const ret=await worker.recognize(crop.canvas);lastBoxes=lastBoxes.concat(extractLines(ret,roi,crop.scale));if(lastBoxes.length===1)lastBoxes.push({cls:'bad',x:roi.x,y:roi.y,w:roi.w,h:roi.h});drawOverlay()}catch(e){lastBoxes=[{cls:'bad',x:roi.x,y:roi.y,w:roi.w,h:roi.h}];drawOverlay()}}
document.getElementById('startBtn').onclick=startCamera;document.getElementById('shotBtn').onclick=async()=>{if(captureFrame()){document.getElementById('shotBtn').disabled=true;await recognize()}};document.getElementById('doneBtn').onclick=completeAndReopen;window.onresize=drawOverlay;loadStd();
</script></body></html>
