<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>AI CAMERA V9 PaddleOCR Only</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.stage{position:fixed;inset:0;background:#000;overflow:hidden}video,canvas{position:absolute;inset:0;width:100vw;height:100vh;object-fit:cover;background:#000}.hidden{display:none!important}.overlay{position:absolute;inset:0;z-index:10;pointer-events:none}.box{position:absolute;border-radius:4px;pointer-events:none}.ocr{border:3px solid #22c55e;background:rgba(34,197,94,.06)}.weak{border:3px solid #f59e0b;background:rgba(245,158,11,.06)}.bad{border:3px solid #ef4444;background:rgba(239,68,68,.06)}.roi{border:4px dashed rgba(59,130,246,.88);background:rgba(59,130,246,.025)}.controls{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));z-index:30;display:flex;justify-content:center;gap:10px;padding:0 10px}.btn{border:0;border-radius:16px;color:#fff;font-weight:900;font-size:16px;padding:12px 14px;min-width:106px;min-height:54px;box-shadow:0 8px 22px rgba(0,0,0,.32);display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1.05}.btn small{display:block;font-size:10px;font-weight:800;opacity:.9;margin-top:3px;letter-spacing:.3px}#doneBtn{background:#dc2626}#startBtn{background:#16a34a}#shotBtn{background:#2563eb}.btn:disabled{opacity:.45}.flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:40;pointer-events:none;transition:opacity .18s}.flash.on{opacity:.52}@media(max-width:390px){.btn{font-size:15px;min-width:96px;padding:11px 10px}.controls{gap:8px}}
</style>
</head>
<body>
<div class="stage"><video id="video" playsinline muted autoplay></video><canvas id="canvas" class="hidden"></canvas><div id="overlay" class="overlay"></div></div>
<div class="controls"><button class="btn" id="doneBtn" disabled>完成释放</button><button class="btn" id="startBtn">打开摄像头<small>V9</small></button><button class="btn" id="shotBtn" disabled>拍照识别</button></div>
<div class="flash" id="flash"></div>
<script type="module">
const video=document.getElementById('video'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),overlay=document.getElementById('overlay');
let stream=null,lastBoxes=[],stdText='',jpBi=new Set(),paddleOCR=null,paddleLoading=null,paddleFailed=false;
function normText(s){return(s||'').toString().toLowerCase().replace(/[\s\n\r\t　]/g,'').replace(/[·•･・]/g,'').replace(/[：:]/g,'').replace(/[、，,。\.]/g,'').replace(/[()（）]/g,'').replace(/[\-‐‑–—]/g,'').replace(/[ａ-ｚＡ-Ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0))}
function bigrams(s){s=normText(s);const a=new Set();for(let i=0;i<s.length-1;i++)a.add(s.slice(i,i+2));return a}
function simToJP(t){const b=bigrams(t);if(!b.size||!jpBi.size)return 0;let hit=0;for(const x of b)if(jpBi.has(x))hit++;return hit/Math.max(1,b.size)}
async function loadStd(){try{const r=await fetch('standard_texts.json',{cache:'no-store'});const j=await r.json();stdText=j.languages?.JP?.text||'';jpBi=bigrams(stdText)}catch(e){}}
function coverMap(){const vw=innerWidth,vh=innerHeight,iw=canvas.width||video.videoWidth||1,ih=canvas.height||video.videoHeight||1,s=Math.max(vw/iw,vh/ih),ox=(vw-iw*s)/2,oy=(vh-ih*s)/2;return{s,ox,oy}}
function addBox(cls,x,y,w,h){lastBoxes.push({cls,x,y,w,h})}
function drawOverlay(){overlay.innerHTML='';const m=coverMap();for(const b of lastBoxes){const d=document.createElement('div');d.className='box '+b.cls;d.style.left=(b.x*m.s+m.ox)+'px';d.style.top=(b.y*m.s+m.oy)+'px';d.style.width=Math.max(4,b.w*m.s)+'px';d.style.height=Math.max(6,b.h*m.s)+'px';overlay.appendChild(d)}}
async function loadPaddleOCR(){if(paddleOCR||paddleFailed)return paddleOCR;if(paddleLoading)return paddleLoading;paddleLoading=(async()=>{const urls=['https://esm.sh/@paddleocr/paddleocr-js','https://cdn.jsdelivr.net/npm/@paddleocr/paddleocr-js/+esm'];for(const u of urls){try{const mod=await import(u);const PaddleOCR=mod.PaddleOCR||mod.default?.PaddleOCR||mod.default;if(!PaddleOCR)continue;const langs=['japan','ja','japanese','ch'];for(const lang of langs){try{return await PaddleOCR.create({lang,ocrVersion:'PP-OCRv5',ortOptions:{backend:'wasm'}})}catch(e){}}}catch(e){}}paddleFailed=true;return null})();paddleOCR=await paddleLoading;return paddleOCR}
async function startCamera(){try{if(stream)stopCamera(false);stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();canvas.classList.add('hidden');video.classList.remove('hidden');lastBoxes=[];overlay.innerHTML='';document.getElementById('shotBtn').disabled=false;document.getElementById('doneBtn').disabled=false;document.getElementById('startBtn').disabled=true;loadPaddleOCR()}catch(e){}}
function stopCamera(clear=true){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null;document.getElementById('shotBtn').disabled=true;document.getElementById('doneBtn').disabled=true;document.getElementById('startBtn').disabled=false;if(clear){lastBoxes=[];overlay.innerHTML='';canvas.classList.add('hidden');video.classList.remove('hidden')}}
async function completeAndReopen(){stopCamera(true);await new Promise(r=>setTimeout(r,180));await startCamera()}
function flash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),90)}
function captureFrame(){const w=video.videoWidth,h=video.videoHeight;if(!w||!h)return false;canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);video.classList.add('hidden');canvas.classList.remove('hidden');flash();return true}
function grayData(){const d=ctx.getImageData(0,0,canvas.width,canvas.height).data,g=new Uint8Array(canvas.width*canvas.height);for(let i=0,p=0;i<d.length;i+=4,p++)g[p]=.299*d[i]+.587*d[i+1]+.114*d[i+2];return g}
function detectFastTextROI(){const w=canvas.width,h=canvas.height,g=grayData();let darkRows=[];for(let y=0;y<h;y++){let d=0;for(let x=0;x<w;x++)if(g[y*w+x]<130)d++;if(d/w>.18)darkRows.push(y)}let py1=darkRows.length?Math.max(0,darkRows[0]-10):Math.round(h*.05),py2=darkRows.length?Math.min(h-1,darkRows[darkRows.length-1]+10):Math.round(h*.88);let col=[];for(let x=0;x<w;x++){let d=0;for(let y=py1;y<=py2;y++)if(g[y*w+x]<130)d++;col[x]=d/(py2-py1+1)}let darkCols=[];for(let x=0;x<w;x++)if(col[x]>.18)darkCols.push(x);let px1=darkCols.length?Math.max(0,darkCols[0]-10):Math.round(w*.05),px2=darkCols.length?Math.min(w-1,darkCols[darkCols.length-1]+10):Math.round(w*.95);let ph=py2-py1+1,pw=px2-px1+1;let labelTop=null;for(let y=py1+Math.round(ph*.38);y<py1+Math.round(ph*.82);y++){let light=0,dark=0;for(let x=px1;x<=px2;x++){const v=g[y*w+x];if(v>180)light++;if(v<120)dark++}if(light/pw>.18&&dark/pw<.55){labelTop=y;break}}let top=py1+Math.round(ph*.06),bottom=py1+Math.round(ph*.56);if(labelTop)bottom=Math.min(bottom,labelTop-Math.round(ph*.035));return{x:px1+Math.round(pw*.02),y:top,w:Math.round(pw*.96),h:Math.max(50,bottom-top)}}
function makeCrop(roi){const maxW=760,scale=Math.min(1,maxW/roi.w),cw=Math.round(roi.w*scale),ch=Math.round(roi.h*scale);const c=document.createElement('canvas');c.width=cw;c.height=ch;const x=c.getContext('2d');x.drawImage(canvas,roi.x,roi.y,roi.w,roi.h,0,0,cw,ch);return{canvas:c,scale}}
function extractPaddleItems(result,roi,scale){const arr=[];const items=result?.items||result?.[0]?.items||result?.ocrResults||result?.data?.items||[];for(const it of items){let text=it.text||it.recText||it.label||'';let b=it.frame||it.box||it.bbox||it.textRegion||it.points;let xs=[],ys=[];if(Array.isArray(b)){for(const p of b){if(Array.isArray(p)){xs.push(p[0]);ys.push(p[1])}else if(typeof p==='object'){xs.push(p.x??p.left??0);ys.push(p.y??p.top??0)}}}else if(b&&typeof b==='object'){xs=[b.left??b.x??0,(b.left??b.x??0)+(b.width??0)];ys=[b.top??b.y??0,(b.top??b.y??0)+(b.height??0)]}if(xs.length&&ys.length){let x=Math.min(...xs)/scale+roi.x,y=Math.min(...ys)/scale+roi.y,w=(Math.max(...xs)-Math.min(...xs))/scale,h=(Math.max(...ys)-Math.min(...ys))/scale;arr.push({text,x,y,w,h})}}return arr}
async function recognize(){lastBoxes=[];const roi=detectFastTextROI();addBox('roi',roi.x,roi.y,roi.w,roi.h);drawOverlay();const ocr=await loadPaddleOCR();if(!ocr){lastBoxes=[];addBox('bad',roi.x,roi.y,roi.w,roi.h);drawOverlay();return}const crop=makeCrop(roi);try{const blob=await new Promise(r=>crop.canvas.toBlob(r,'image/jpeg',.88));const result=await ocr.predict(blob);const items=extractPaddleItems(result,roi,crop.scale);for(const it of items){const s=simToJP(it.text),cls=s>.28?'ocr':s>.10?'weak':'bad';if(it.w>8&&it.h>4)addBox(cls,it.x,it.y,it.w,it.h)}if(lastBoxes.length===1)addBox('bad',roi.x,roi.y,roi.w,roi.h);drawOverlay()}catch(e){lastBoxes=[];addBox('bad',roi.x,roi.y,roi.w,roi.h);drawOverlay()}}
document.getElementById('startBtn').onclick=startCamera;document.getElementById('shotBtn').onclick=async()=>{if(captureFrame()){document.getElementById('shotBtn').disabled=true;await recognize()}};document.getElementById('doneBtn').onclick=completeAndReopen;window.onresize=drawOverlay;loadStd();
</script>
</body></html>
