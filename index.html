<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/><title>AI CAMERA V11 SCORE ONLY</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.stage{position:fixed;inset:0;background:#000;overflow:hidden}video,canvas{position:absolute;inset:0;width:100vw;height:100vh;object-fit:cover;background:#000}.hidden{display:none!important}.controls{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));z-index:30;display:flex;justify-content:center;gap:10px;padding:0 10px}.btn{border:0;border-radius:16px;color:#fff;font-weight:900;font-size:16px;padding:12px 14px;min-width:106px;min-height:54px;box-shadow:0 8px 22px rgba(0,0,0,.32);display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1.05}.btn small{display:block;font-size:10px;font-weight:800;opacity:.9;margin-top:3px;letter-spacing:.3px}#doneBtn{background:#dc2626}#startBtn{background:#16a34a}#shotBtn{background:#2563eb}.btn:disabled{opacity:.45}.flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:40;pointer-events:none;transition:opacity .18s}.flash.on{opacity:.52}.scoreWrap{position:fixed;left:50%;top:calc(18px + env(safe-area-inset-top));transform:translateX(-50%);z-index:35;display:none}.scoreCard{min-width:150px;padding:14px 20px;border-radius:18px;color:#fff;text-align:center;background:rgba(17,24,39,.82);box-shadow:0 8px 22px rgba(0,0,0,.32);backdrop-filter:blur(6px)}.scoreCard.good{background:rgba(22,163,74,.82)}.scoreCard.mid{background:rgba(217,119,6,.84)}.scoreCard.bad{background:rgba(220,38,38,.84)}.pct{font-size:40px;font-weight:1000;line-height:1}.lbl{font-size:12px;font-weight:900;opacity:.95;margin-top:6px;letter-spacing:.5px}.sub{font-size:10px;opacity:.9;margin-top:3px}@media(max-width:390px){.btn{font-size:15px;min-width:96px;padding:11px 10px}.controls{gap:8px}.pct{font-size:36px}}
</style></head><body><div class="stage"><video id="video" playsinline muted autoplay></video><canvas id="canvas" class="hidden"></canvas></div><div class="scoreWrap" id="scoreWrap"><div class="scoreCard" id="scoreCard"><div class="pct" id="pct">--%</div><div class="lbl">可信度</div><div class="sub" id="sub"></div></div></div><div class="controls"><button class="btn" id="doneBtn" disabled>完成释放</button><button class="btn" id="startBtn">打开摄像头<small>V11</small></button><button class="btn" id="shotBtn" disabled>拍照识别</button></div><div class="flash" id="flash"></div>
<script type="module">
const video=document.getElementById('video'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');let stream=null,ocrWorker=null,loadingOCR=null,jpBi=new Set(),jpText='';const scoreWrap=document.getElementById('scoreWrap'),scoreCard=document.getElementById('scoreCard'),pctEl=document.getElementById('pct'),subEl=document.getElementById('sub');
function normText(s){return(s||'').toString().toLowerCase().replace(/[\s\n\r\t　]/g,'').replace(/[·•･・]/g,'').replace(/[：:]/g,'').replace(/[、，,。\.]/g,'').replace(/[()（）]/g,'').replace(/[\-‐‑–—]/g,'').replace(/[ａ-ｚＡ-Ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0))}
function bigrams(s){s=normText(s);const a=new Set();for(let i=0;i<s.length-1;i++)a.add(s.slice(i,i+2));return a}
function simJP(text){const b=bigrams(text);if(!b.size||!jpBi.size)return 0;let hit=0;for(const x of b)if(jpBi.has(x))hit++;return hit/Math.max(1,b.size)}
function showScore(score, detail=''){scoreWrap.style.display='block';scoreCard.className='scoreCard '+(score>=70?'good':score>=45?'mid':'bad');pctEl.textContent=Math.round(score)+'%';subEl.textContent=detail}
function hideScore(){scoreWrap.style.display='none';pctEl.textContent='--%';subEl.textContent='';scoreCard.className='scoreCard'}
async function loadStd(){try{const r=await fetch('standard_texts.json',{cache:'no-store'});const j=await r.json();jpText=j.languages?.JP?.text||'';jpBi=bigrams(jpText)}catch(e){jpText='';jpBi=new Set()}}
async function loadOCR(){if(ocrWorker)return ocrWorker;if(loadingOCR)return loadingOCR;loadingOCR=(async()=>{await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s)});ocrWorker=await Tesseract.createWorker('jpn');try{await ocrWorker.setParameters({tessedit_pageseg_mode:'6',preserve_interword_spaces:'1',tessedit_do_invert:'0'})}catch(e){}return ocrWorker})().catch(e=>null);return loadingOCR}
function grayData(){const d=ctx.getImageData(0,0,canvas.width,canvas.height).data,g=new Uint8Array(canvas.width*canvas.height);for(let i=0,p=0;i<d.length;i+=4,p++)g[p]=.299*d[i]+.587*d[i+1]+.114*d[i+2];return g}
function detectROI(){const w=canvas.width,h=canvas.height,g=grayData();let darkRows=[];for(let y=0;y<h;y++){let d=0;for(let x=0;x<w;x++)if(g[y*w+x]<130)d++;if(d/w>.18)darkRows.push(y)}let py1=darkRows.length?Math.max(0,darkRows[0]-10):Math.round(h*.05),py2=darkRows.length?Math.min(h-1,darkRows[darkRows.length-1]+10):Math.round(h*.88);let col=[];for(let x=0;x<w;x++){let d=0;for(let y=py1;y<=py2;y++)if(g[y*w+x]<130)d++;col[x]=d/(py2-py1+1)}let darkCols=[];for(let x=0;x<w;x++)if(col[x]>.18)darkCols.push(x);let px1=darkCols.length?Math.max(0,darkCols[0]-10):Math.round(w*.05),px2=darkCols.length?Math.min(w-1,darkCols[darkCols.length-1]+10):Math.round(w*.95);let ph=py2-py1+1,pw=px2-px1+1;let labelTop=null;for(let y=py1+Math.round(ph*.38);y<py1+Math.round(ph*.82);y++){let light=0,dark=0;for(let x=px1;x<=px2;x++){let v=g[y*w+x];if(v>180)light++;if(v<120)dark++}if(light/pw>.18&&dark/pw<.55){labelTop=y;break}}let top=py1+Math.round(ph*.07),bottom=py1+Math.round(ph*.54);if(labelTop)bottom=Math.min(bottom,labelTop-Math.round(ph*.035));return{x:px1+Math.round(pw*.02),y:top,w:Math.round(pw*.96),h:Math.max(50,bottom-top)}}
function makeCrop(r){const maxW=420,scale=Math.min(1,maxW/r.w),cw=Math.round(r.w*scale),ch=Math.round(r.h*scale);const c=document.createElement('canvas');c.width=cw;c.height=ch;const x=c.getContext('2d');x.drawImage(canvas,r.x,r.y,r.w,r.h,0,0,cw,ch);const img=x.getImageData(0,0,cw,ch),d=img.data;for(let i=0;i<d.length;i+=4){let v=.299*d[i]+.587*d[i+1]+.114*d[i+2];v=(v-128)*1.6+128;v=v>136?255:0;d[i]=d[i+1]=d[i+2]=v}x.putImageData(img,0,0);return c}
async function startCamera(){try{if(stream)stopCamera(false);stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();canvas.classList.add('hidden');video.classList.remove('hidden');hideScore();document.getElementById('shotBtn').disabled=false;document.getElementById('doneBtn').disabled=false;document.getElementById('startBtn').disabled=true;loadOCR()}catch(e){}}
function stopCamera(clear=true){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null;document.getElementById('shotBtn').disabled=true;document.getElementById('doneBtn').disabled=true;document.getElementById('startBtn').disabled=false;if(clear){canvas.classList.add('hidden');video.classList.remove('hidden');hideScore()}}
async function completeAndReopen(){stopCamera(true);await new Promise(r=>setTimeout(r,180));await startCamera()}function flash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),90)}
function capture(){const w=video.videoWidth,h=video.videoHeight;if(!w||!h)return false;canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);video.classList.add('hidden');canvas.classList.remove('hidden');flash();return true}
async function recognize(){const worker=await loadOCR();if(!worker){showScore(0,'OCR加载失败');return}const r=detectROI();const crop=makeCrop(r);try{const ret=await worker.recognize(crop);const text=ret?.data?.text||'';const textSim=simJP(text);const meanConf=((ret?.data?.confidence||0)/100);const score=(textSim*0.72+meanConf*0.28)*100;showScore(score, Math.round(textSim*100)+' / '+Math.round(meanConf*100))}catch(e){showScore(0,'识别失败')}}
document.getElementById('startBtn').onclick=startCamera;document.getElementById('shotBtn').onclick=async()=>{if(capture()){document.getElementById('shotBtn').disabled=true;await recognize()}};document.getElementById('doneBtn').onclick=completeAndReopen;loadStd();
</script></body></html>
