<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>AI CAMERA V12 iOS OCR Score</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b1020;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at top,#1e3a8a 0,#0b1020 44%,#030712 100%)}.card{width:min(88vw,420px);border-radius:28px;padding:26px 22px;text-align:center;background:rgba(15,23,42,.84);box-shadow:0 18px 50px rgba(0,0,0,.38);backdrop-filter:blur(10px)}.score{font-size:76px;line-height:1;font-weight:1000;letter-spacing:-3px}.label{margin-top:10px;font-size:20px;font-weight:900}.detail{margin-top:12px;font-size:13px;opacity:.88;line-height:1.55}.badge{display:inline-block;margin-top:18px;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.12);font-size:12px;font-weight:900}.good{background:linear-gradient(180deg,rgba(22,163,74,.92),rgba(21,128,61,.92))}.mid{background:linear-gradient(180deg,rgba(217,119,6,.94),rgba(180,83,9,.94))}.bad{background:linear-gradient(180deg,rgba(220,38,38,.94),rgba(153,27,27,.94))}.empty{background:linear-gradient(180deg,rgba(71,85,105,.94),rgba(30,41,59,.94))}.textarea{position:fixed;left:18px;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));height:110px;border:0;border-radius:18px;padding:12px;background:rgba(255,255,255,.09);color:#fff;font-size:12px;outline:none;resize:none;display:none}.manualBtn{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);border:0;border-radius:18px;background:#2563eb;color:#fff;font-weight:900;font-size:16px;padding:14px 20px;box-shadow:0 8px 22px rgba(0,0,0,.32);display:none}.version{position:fixed;right:14px;top:calc(12px + env(safe-area-inset-top));font-size:12px;font-weight:900;opacity:.8}.hint{position:fixed;left:16px;right:16px;bottom:calc(18px + env(safe-area-inset-bottom));font-size:12px;text-align:center;opacity:.75;line-height:1.45}
</style>
</head>
<body>
<div class="version">V12</div>
<div class="page"><div class="card empty" id="card"><div class="score" id="score">--%</div><div class="label" id="label">等待 iOS OCR 文本</div><div class="detail" id="detail">请用快捷指令识别后打开本页，并把 OCR 文本放在 URL 参数 ocr= 后面。</div><div class="badge" id="badge">AI CAMERA V12</div></div></div>
<div class="hint" id="hint">格式：...?ocr=识别文本</div>
<script>
const STANDARD = "Oakley Meta の特長:カメラ、オープンイヤーオーディオ、コ\nンパニオンアプリと連携してコンテンツを編集·共有できます。\n重要!13歳以上対象·個人用医療機器に影響を及ぼす可能性があります\n·フル音声コマンドは英語、フランス語、スペイン語、イタリア語でのみ利\n用可能です、必要条件:Android(位置情報サービス有効)を搭載した携\n帯電話、または iOS搭載 iPhone、ワイヤレスインターネット接続、Meta\nアカウント·詳細なシステム要件、ソフトウェアライセンス条件、利用規約\nは www.oakley.com で確認できます·保証情報は同封されており、www.\noakley.comでも確認できます·機能やコンテンツは予告なく変更または\n終了される場合があり、デジタル著作権管理技術により保護されている場\n合があります。また一部地域では利用できない、または制限される場合が\nあり、ワイヤレスプランや ISP に依存する場合や、サブスクリプションまた\nは料金が必要となる場合があります·初回使用前を含め、随時アップデー\nトのインストールが必要です·本機器はFCC規則第15部に適合していま\nす。運用は次の2つの条件に従うものとします:(1)本機器は有害な干渉\nを発生させてはならず、(2)意図しない動作を引き起こす可能性のある干渉\nを含め、受信されるいかなる干渉も受け入れなければならない。データス\nトレージ容量32 GB·壁面アダプターとケーブルは付属していません。\n\nモデルコード 00W8002\nカラーコード 800203\n品名: 電子機能付サングラス\nレンズの材質 プラスチック\nレンズわく: プラスチック\nテンプル ブラスチック\n可視光線透過率 11 %\n紫外線透過率 1.0% 以下\nMADE IN VIETNAM\nルックスオティカジャパン株式会社\n7756\n102-0084 東京都千代田区二番町4-5\nOakley Inc., One Icon Foothill Ranch CA 92610, USA\nMade for iPhone Conçu pour iPhone";
function decodeParam(){const u=new URL(location.href);let t=u.searchParams.get('ocr')||u.searchParams.get('text')||'';try{t=decodeURIComponent(t)}catch(e){}return t.replace(/<br\s*\/?\s*>/gi,'\n')}
function norm(s){return (s||'').toString().toLowerCase().replace(/<br\s*\/?\s*>/gi,'').replace(/[\s\n\r\t　]/g,'').replace(/[·•･・]/g,'').replace(/[：:]/g,'').replace(/[、，,。\.]/g,'').replace(/[()（）]/g,'').replace(/[\-‐‑–—]/g,'').replace(/[ａ-ｚＡ-Ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0))}
function grams(s,n){s=norm(s);const set=new Set();for(let i=0;i<=s.length-n;i++)set.add(s.slice(i,i+n));return set}
function hitRate(a,b){if(!a.size||!b.size)return 0;let hit=0;for(const x of a)if(b.has(x))hit++;return hit/a.size}
function containsRate(ocr,std){const o=norm(ocr), s=norm(std);if(!o||!s)return 0;let chunks=0,hit=0;for(let i=0;i<s.length;i+=18){const c=s.slice(i,i+18);if(c.length>=8){chunks++; if(o.includes(c.slice(0,Math.min(12,c.length))) || o.includes(c.slice(Math.max(0,c.length-12)))) hit++;}}return chunks?hit/chunks:0}
function scoreText(ocr){const s2=hitRate(grams(ocr,2),grams(STANDARD,2));const s3=hitRate(grams(ocr,3),grams(STANDARD,3));const c=containsRate(ocr,STANDARD);const len=Math.min(1,norm(ocr).length/Math.max(1,norm(STANDARD).length*.45));let score=(s2*.35+s3*.40+c*.15+len*.10)*100;return Math.max(0,Math.min(99,score))}
function show(score,ocr){const card=document.getElementById('card'),scoreEl=document.getElementById('score'),label=document.getElementById('label'),detail=document.getElementById('detail'),badge=document.getElementById('badge'),hint=document.getElementById('hint');card.className='card '+(score>=75?'good':score>=50?'mid':'bad');scoreEl.textContent=Math.round(score)+'%';label.textContent=score>=75?'JP 可信度高':score>=50?'JP 疑似匹配':'JP 可信度低';detail.textContent='OCR字数 '+norm(ocr).length+' / 标准字数 '+norm(STANDARD).length;badge.textContent='AI CAMERA V12 · iOS OCR';hint.style.display='none'}
const ocr=decodeParam();if(ocr){show(scoreText(ocr),ocr)}
</script>
</body>
</html>
