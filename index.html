<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>AI CAMERA V7 PaddleOCR Test</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.stage{position:fixed;inset:0;background:#000;overflow:hidden}video,canvas{position:absolute;inset:0;width:100vw;height:100vh;object-fit:cover;background:#000}.hidden{display:none!important}.overlay{position:absolute;inset:0;z-index:10;pointer-events:none}.box{position:absolute;border-radius:4px;pointer-events:none}.ocr{border:3px solid #22c55e;background:rgba(34,197,94,.06)}.weak{border:3px solid #f59e0b;background:rgba(245,158,11,.06)}.bad{border:3px solid #ef4444;background:rgba(239,68,68,.06)}.engine{border:4px dashed rgba(168,85,247,.75);background:rgba(168,85,247,.025)}.controls{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));z-index:30;display:flex;justify-content:center;gap:10px;padding:0 10px}.btn{border:0;border-radius:16px;color:#fff;font-weight:900;font-size:16px;padding:14px 16px;min-width:106px;box-shadow:0 8px 22px rgba(0,0,0,.32)}#doneBtn{background:#dc2626}#startBtn{background:#16a34a}#shotBtn{background:#2563eb}.btn:disabled{opacity:.45}.flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:40;pointer-events:none;transition:opacity .18s}.flash.on{opacity:.52}@media(max-width:390px){.btn{font-size:15px;min-width:96px;padding:13px 12px}.controls{gap:8px}}
</style>
</head>
<body>
<div class="stage"><video id="video" playsinline muted autoplay></video><canvas id="canvas" class="hidden"></canvas><div id="overlay" class="overlay"></div></div>
<div class="controls"><button class="btn" id="doneBtn" disabled>完成释放</button><button class="btn" id="startBtn">打开摄像头</button><button class="btn" id="shotBtn" disabled>拍照识别</button></div>
<div class="flash" id="flash"></div>
<script type="module">
const video=document.getElementById('video'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),overlay=document.getElementById('overlay');
let stream=null,photoMode=false,ocrEngine=null,engineName='',stdTexts={},lastBoxes=[];
const JP_TEXT = "Oakley Meta の特長:カメラ、オープンイヤーオーディオ、コ\nンパニオンアプリと連携してコンテンツを編集·共有できます。\n重要!13歳以上対象·個人用医療機器に影響を及ぼす可能性があります\n·フル音声コマンドは英語、フランス語、スペイン語、イタリア語でのみ利\n用可能です、必要条件:Android(位置情報サービス有効)を搭載した携\n帯電話、または iOS搭載 iPhone、ワイヤレスインターネット接続、Meta\nアカウント·詳細なシステム要件、ソフトウェアライセンス条件、利用規約\nは www.oakley.com で確認できます·保証情報は同封されており、www.\noakley.comでも確認できます·機能やコンテンツは予告なく変更または\n終了される場合があり、デジタル著作権管理技術により保護されている場\n合があります。また一部地域では利用できない、または制限される場合が\nあり、ワイヤレスプランや ISP に依存する場合や、サブスクリプションまた\nは料金が必要となる場合があります·初回使用前を含め、随時アップデー\nトのインストールが必要です·本機器はFCC規則第15部に適合していま\nす。運用は次の2つの条件に従うものとします:(1)本機器は有害な干渉\nを発生させてはならず、(2)意図しない動作を引き起こす可能性のある干渉\nを含め、受信されるいかなる干渉も受け入れなければならない。データス\nトレージ容量32 GB·壁面アダプターとケーブルは付属していません。\n\nモデルコード\n00W8002\n\n注意 高温の所には\n\nカラーコード\n\n800203\n\n1かないで下さい。\n\n品名:\n\n電子機能付サングラス\n\n本商品は傷の付き\nレンズの材質 プラスチック(傷光·コーチィング\nプラスチック\n\nにくいレンズを\n\nレンズわく:\nテンプル\n\nブラスチック\n\n使用しておりますが、\n金属と一緒にしまうと\n\n可視光線透過率\n11 %\n\n陽が付く事があります。\n\n業外線透過率\n\n1.0% 以下\nMADE IN VIETNAM\n\nルックスオティカジャパン株式会社\n\n7756\n\n102-0084 東京都千代田区二番町4-5\n\nOakley Inc., One Icon\n\nConçu pour\n\nFoothill Ranch\n\n紙\n\nMade for\nkiPhone\n\nkiPhone\n\nCA 92610, USA";
function normText(s){return (s||'').toString().toLowerCase().replace(/[\s\n\r\t　]/g,'').replace(/[·•･・]/g,'').replace(/[：:]/g,'').replace(/[、，,。\.]/g,'').replace(/[()（）]/g,'').replace(/[\-‐‑–—]/g,'').replace(/[ａ-ｚＡ-Ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0));}
function bigrams(s){s=normText(s);const a=new Set();for(let i=0;i<s.length-1;i++)a.add(s.slice(i,i+2));return a}
const jpBi=bigrams(JP_TEXT);
function simToJP(t){const b=bigrams(t);if(!b.size||!jpBi.size)return 0;let hit=0;for(const x of b)if(jpBi.has(x))hit++;return hit/Math.max(1,b.size)}
function coverMap(){const vw=innerWidth,vh=innerHeight,iw=canvas.width||video.videoWidth||1,ih=canvas.height||video.videoHeight||1,s=Math.max(vw/iw,vh/ih),ox=(vw-iw*s)/2,oy=(vh-ih*s)/2;return{s,ox,oy}}
function drawBox(cls,x,y,w,h){const m=coverMap();const d=document.createElement('div');d.className='box '+cls;d.style.left=(x*m.s+m.ox)+'px';d.style.top=(y*m.s+m.oy)+'px';d.style.width=Math.max(4,w*m.s)+'px';d.style.height=Math.max(6,h*m.s)+'px';overlay.appendChild(d)}
function drawOverlay(){overlay.innerHTML='';for(const b of lastBoxes)drawBox(b.cls,b.x,b.y,b.w,b.h)}
async function startCamera(){try{if(stream)stopCamera(false);stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();photoMode=false;canvas.classList.add('hidden');video.classList.remove('hidden');overlay.innerHTML='';lastBoxes=[];document.getElementById('shotBtn').disabled=false;document.getElementById('doneBtn').disabled=false;document.getElementById('startBtn').disabled=true}catch(e){}}
function stopCamera(clear=true){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null;document.getElementById('shotBtn').disabled=true;document.getElementById('doneBtn').disabled=true;document.getElementById('startBtn').disabled=false;if(clear){overlay.innerHTML='';lastBoxes=[];canvas.classList.add('hidden');video.classList.remove('hidden');photoMode=false}}
async function completeAndReopen(){stopCamera(true);await new Promise(r=>setTimeout(r,180));await startCamera()}
function flash(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),90)}
function captureFrame(){const w=video.videoWidth,h=video.videoHeight;if(!w||!h)return false;canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);photoMode=true;video.classList.add('hidden');canvas.classList.remove('hidden');flash();return true}
async function loadPaddle(){
  const urls=['https://esm.sh/@paddleocr/paddleocr-js','https://cdn.jsdelivr.net/npm/@paddleocr/paddleocr-js/+esm'];
  for(const u of urls){try{const mod=await import(u);const PaddleOCR=mod.PaddleOCR||mod.default?.PaddleOCR||mod.default; if(!PaddleOCR)continue; const langs=['japan','ja','japanese','ch']; let lastErr=null; for(const lang of langs){try{const ocr=await PaddleOCR.create({lang,ocrVersion:'PP-OCRv5',ortOptions:{backend:'wasm'}}); return {type:'paddle',ocr,lang}}catch(e){lastErr=e}}}catch(e){}}
  return null;
}
async function loadTesseract(){
  try{await new Promise((resolve,reject)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';s.onload=resolve;s.onerror=reject;document.head.appendChild(s)});const worker=await Tesseract.createWorker('jpn+eng');return {type:'tesseract',worker}}catch(e){return null}
}
async function ensureOCR(){if(ocrEngine)return ocrEngine;ocrEngine=await loadPaddle();if(!ocrEngine)ocrEngine=await loadTesseract();return ocrEngine}
function extractPaddleItems(result){const arr=[];const items=result?.items||result?.[0]?.items||result?.ocrResults||result?.data?.items||[];for(const it of items){let text=it.text||it.recText||it.label||'';let score=it.score||it.confidence||it.recScore||0.8;let b=it.frame||it.box||it.bbox||it.textRegion||it.points;let xs=[],ys=[];if(Array.isArray(b)){for(const p of b){if(Array.isArray(p)){xs.push(p[0]);ys.push(p[1])}else if(typeof p==='object'){xs.push(p.x??p.left??0);ys.push(p.y??p.top??0)}}}else if(b&&typeof b==='object'){xs=[b.left??b.x??0,(b.left??b.x??0)+(b.width??0)];ys=[b.top??b.y??0,(b.top??b.y??0)+(b.height??0)]}if(xs.length&&ys.length){const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;arr.push({text,score,x,y,w,h})}}
  return arr;
}
function extractTessItems(ret){const arr=[];const lines=ret?.data?.lines||[];for(const ln of lines){const b=ln.bbox||{};arr.push({text:ln.text||'',score:(ln.confidence||0)/100,x:b.x0||0,y:b.y0||0,w:(b.x1||0)-(b.x0||0),h:(b.y1||0)-(b.y0||0)})}return arr}
async function recognize(){const eng=await ensureOCR();lastBoxes=[];if(!eng){lastBoxes=[{cls:'bad',x:canvas.width*.05,y:canvas.height*.35,w:canvas.width*.90,h:canvas.height*.12}];drawOverlay();return}
  try{let raw,items=[];if(eng.type==='paddle'){const blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',.92));raw=await eng.ocr.predict(blob);items=extractPaddleItems(raw)}else{raw=await eng.worker.recognize(canvas);items=extractTessItems(raw)}
    let fullText=items.map(x=>x.text).join('\n');let global=simToJP(fullText);
    for(const it of items){if(!it.w||!it.h)continue;const s=Math.max(simToJP(it.text),global*.35);const cls=s>.42?'ocr':s>.18?'weak':'bad';lastBoxes.push({cls,x:it.x,y:it.y,w:it.w,h:it.h})}
    if(!lastBoxes.length){lastBoxes=[{cls:'bad',x:canvas.width*.08,y:canvas.height*.25,w:canvas.width*.84,h:canvas.height*.25}]}
    drawOverlay();
  }catch(e){lastBoxes=[{cls:'bad',x:canvas.width*.05,y:canvas.height*.35,w:canvas.width*.90,h:canvas.height*.12}];drawOverlay()}}
document.getElementById('startBtn').onclick=startCamera;document.getElementById('shotBtn').onclick=async()=>{if(captureFrame()){document.getElementById('shotBtn').disabled=true;await recognize()}};document.getElementById('doneBtn').onclick=completeAndReopen;window.onresize=drawOverlay;loadMemoryStub();async function loadMemoryStub(){try{const r=await fetch('standard_texts.json',{cache:'no-store'});stdTexts=await r.json()}catch(e){}}
</script>
</body>
</html>
